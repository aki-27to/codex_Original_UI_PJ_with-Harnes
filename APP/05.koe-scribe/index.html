<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>KoeScribe</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">APP 05 / Video Transcript</p>
          <h1>KoeScribe</h1>
        </div>
        <div class="runtime-pill" id="runtimeStatus">runtime checking</div>
      </header>

      <main class="workspace">
        <section class="input-pane" aria-labelledby="inputTitle">
          <div class="section-head">
            <p class="eyebrow">Source</p>
            <h2 id="inputTitle">動画</h2>
          </div>

          <label class="dropzone" id="dropzone" for="videoFile">
            <input id="videoFile" type="file" accept="video/*,audio/*">
            <span class="drop-icon" aria-hidden="true"></span>
            <strong id="fileName">ファイルを選択</strong>
            <span id="fileMeta">MP4 / MOV / M4A / WAV</span>
          </label>

          <label class="field">
            <span>ローカルパス（任意）</span>
            <input id="videoPath" type="text" autocomplete="off" placeholder="C:\Users\akima\Videos\sample.mp4">
            <small class="field-note">動画を添付した場合、この欄は空でOKです。実行時にローカル専用サーバーへ保存します。</small>
          </label>

          <div class="grid-two">
            <label class="field">
              <span>出力先</span>
              <input id="outputDir" type="text" autocomplete="off" placeholder="動画と同じフォルダ">
            </label>
            <label class="field">
              <span>言語</span>
              <select id="language">
                <option value="ja" selected>日本語</option>
                <option value="en">英語</option>
                <option value="auto">自動判定</option>
              </select>
            </label>
          </div>

          <div class="grid-two">
            <label class="field">
              <span>エンジン</span>
              <input id="engine" type="hidden" value="codex-openai-transcription">
              <div class="locked-field">Codex / OpenAI transcription</div>
            </label>
            <label class="field">
              <span>品質</span>
              <select id="quality">
                <option value="technical" selected>専門用語優先</option>
                <option value="subtitle">字幕の読みやすさ優先</option>
                <option value="verbatim">逐語寄り</option>
              </select>
            </label>
          </div>

          <label class="field">
            <span>用語補正</span>
            <textarea id="glossary" rows="5" placeholder="Claude Code&#10;Codex&#10;Skill&#10;MCP&#10;Whisper"></textarea>
          </label>

          <div class="option-row">
            <label><input id="makeSrt" type="checkbox" checked> SRT</label>
            <label><input id="makeVtt" type="checkbox" checked> VTT</label>
            <label><input id="makeMarkdown" type="checkbox" checked> Markdown</label>
          </div>

          <div class="actions">
            <button id="runBtn" type="button" class="primary">文字起こし開始</button>
            <button id="stopBtn" type="button" class="secondary" disabled>停止</button>
          </div>
        </section>

        <section class="output-pane" aria-labelledby="outputTitle">
          <div class="section-head output-head">
            <div>
              <p class="eyebrow">Result</p>
              <h2 id="outputTitle">文字起こし結果</h2>
            </div>
            <button id="copyBtn" type="button" class="secondary copy-button" disabled>全文コピー</button>
          </div>

          <article id="transcriptPanel" class="panel result-panel">
            <pre id="transcriptOutput">待機中</pre>
          </article>
        </section>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
