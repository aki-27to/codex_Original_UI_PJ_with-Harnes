<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; connect-src 'self' blob:; img-src 'self' data: blob:; media-src 'self' blob:; style-src 'self' 'unsafe-inline'; object-src 'none'; base-uri 'self'; frame-ancestors 'none';">
  <title>English Conversation App</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app-shell">
    <header class="app-header">
      <div>
        <h1>English Conversation App</h1>
        <p>Realtime talk with Codex + local TTS.</p>
      </div>
      <span id="connectionBadge" class="badge pending">Checking connection</span>
    </header>

    <section class="control-panel" aria-label="Realtime and voice settings">
      <div class="control-row">
        <button id="voiceInputBtn" type="button" class="ghost-btn">Start Realtime Talk</button>
        <button id="newSessionBtn" type="button" class="ghost-btn">Clear Chat</button>
        <label class="voice-select compact" for="silenceMsSelect">
          Silence
          <select id="silenceMsSelect">
            <option value="900">0.9s</option>
            <option value="1200" selected>1.2s</option>
            <option value="1500">1.5s</option>
            <option value="2000">2.0s</option>
          </select>
        </label>
        <label class="voice-select compact" for="ttsProviderSelect">
          TTS
          <select id="ttsProviderSelect">
            <option value="browser">Browser</option>
            <option value="kokoro">Kokoro</option>
            <option value="piper">Piper</option>
          </select>
        </label>
        <label class="voice-toggle compact">
          <input id="ttsEnabled" type="checkbox" checked>
          Read aloud
        </label>
      </div>
      <div class="control-row secondary">
        <label class="voice-select compact" for="conversationModeSelect">
          Mode
          <select id="conversationModeSelect">
            <option value="normal" selected>Normal</option>
            <option value="persona_friend">Friend Persona</option>
          </select>
        </label>
        <label class="voice-select compact" for="recognitionLangSelect">
          Voice Input
          <select id="recognitionLangSelect">
            <option value="en-US" selected>English (US)</option>
            <option value="en-GB">English (UK)</option>
            <option value="en-AU">English (AU)</option>
            <option value="ja-JP">Japanese (JP)</option>
          </select>
        </label>
        <button id="personaResetBtn" type="button" class="ghost-btn danger" hidden>Reset Friend Memory</button>
      </div>
      <p id="conversationModeHint" class="voice-note">Normal mode: neutral conversation partner.</p>
      <p id="personaMemoryStatus" class="voice-note" hidden>Friend memory: empty</p>
      <p id="ttsEngineHint" class="voice-note">TTS: Microsoft / browser voice.</p>
      <p id="voiceStatus" class="voice-status ready">Realtime is off.</p>
    </section>

    <section class="avatar-panel" aria-label="Avatar view">
      <div id="avatarStage" class="avatar-stage">
        <canvas id="avatarCanvas" aria-label="3D avatar viewport"></canvas>
      </div>
      <p id="avatarStatus" class="avatar-status">Avatar: loading...</p>
    </section>

    <section id="chatLog" class="chat-log empty" aria-live="polite" aria-label="Chat log"></section>

    <form id="composer" class="composer">
      <label for="messageInput">Your message</label>
      <textarea id="messageInput" rows="4" placeholder="I want to practice speaking about traveling in English."></textarea>
      <div class="composer-actions">
        <button id="sendBtn" type="submit" class="primary-btn">Send</button>
        <button id="stopBtn" type="button" class="ghost-btn" disabled>Stop</button>
      </div>
      <p class="composer-hint">Enter: send / Shift+Enter: new line</p>
    </form>
  </main>

  <template id="messageTemplate">
    <article class="message">
      <p class="message-meta"></p>
      <p class="message-body"></p>
    </article>
  </template>

  <script type="importmap">
    {
      "imports": {
        "three": "./vendor/three.module.js",
        "three/addons/": "./vendor/three/addons/",
        "@pixiv/three-vrm": "./vendor/three-vrm.module.js"
      }
    }
  </script>
  <script type="module" src="./avatar.js"></script>
  <script src="./app.js"></script>
  <script>
    window.setTimeout(() => {
      const bridge = window.__avatarBridge;
      const statusEl = document.getElementById("avatarStatus");
      if (!statusEl) return;
      if (!bridge || bridge.booted !== true) {
        statusEl.textContent = "Avatar: script failed to start (module import blocked).";
        statusEl.className = "avatar-status error";
      }
    }, 6000);
  </script>
</body>
</html>
