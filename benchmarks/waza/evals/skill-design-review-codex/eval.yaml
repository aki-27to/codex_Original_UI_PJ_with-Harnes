name: skill-design-review-codex-external-benchmark
description: External real-Waza benchmark for skill-design-review-codex. This stays outside the governed harness runtime.
skill: skill-design-review-codex
version: "1.0"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: mock
  model: claude-sonnet-4.6
metrics:
  - name: task_completion
    weight: 1.0
    threshold: 1.0
    description: Did Waza load the expected skill benchmark fixture and satisfy deterministic output checks?
tasks:
  - "tasks/*.yaml"
