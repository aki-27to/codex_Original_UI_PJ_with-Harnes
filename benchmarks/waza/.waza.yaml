# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/waza/main/schemas/config.schema.json

paths:
  skills: skills/
  evals: evals/
  results: results/
defaults:
  engine: mock
  model: claude-sonnet-4.6
  timeout: 300
  parallel: false
  workers: 4
  verbose: false
  sessionLog: false
cache:
  enabled: false
  dir: .waza-cache
server:
  port: 3000
  resultsDir: results/
graders:
  programTimeout: 30

